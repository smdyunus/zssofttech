<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZS Soft Tech — Enquiry</title>
    <link rel="stylesheet" href="css/main.css" />
    <script>
      window.ZS_STATIC_BASE = "";
      window.ZS_FORMSUBMIT_EMAIL = "zssofttech@gmail.com";
    </script>
  </head>
  <body>
    <header data-include-header></header>

    <main>
      <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem">Enquire / Register</h1>
      <p style="color: #94a3b8; font-size: 0.9375rem; margin-bottom: 1rem">
        Quick enquiry form (AJAX). Use <strong>Register Now</strong> on a course for the popup.
      </p>

      <button type="button" class="btn btn-primary" data-open-registration style="max-width: 220px; margin-bottom: 1rem">
        Register Now (modal)
      </button>

      <section class="form-card">
        <h2 style="margin-top: 0; font-size: 1.125rem">General enquiry</h2>
        <form
          id="enquiry-form"
          novalidate
          data-email-subject="ZS Soft Tech — Website enquiry"
          data-thank-you="thank-you.html"
        >
          <div class="form-group" data-field="name">
            <label for="eq-name">Full name *</label>
            <input id="eq-name" name="name" type="text" autocomplete="name" />
            <p class="field-error"></p>
          </div>
          <div class="form-group" data-field="phone">
            <label for="eq-phone">Phone *</label>
            <input id="eq-phone" name="phone" type="tel" inputmode="numeric" maxlength="10" autocomplete="tel" />
            <p class="field-error"></p>
          </div>
          <div class="form-group" data-field="email">
            <label for="eq-email">Email *</label>
            <input id="eq-email" name="email" type="email" autocomplete="email" />
            <p class="field-error"></p>
          </div>
          <div class="form-group" data-field="course">
            <label for="eq-course">Course *</label>
            <select id="eq-course" name="course" data-course-options data-placeholder="Select course"></select>
            <p class="field-error"></p>
          </div>
          <div class="form-group" data-field="message">
            <label for="eq-message">Message</label>
            <textarea id="eq-message" name="message" rows="4"></textarea>
            <p class="field-error"></p>
          </div>
          <p class="form-status"></p>
          <button type="submit" class="btn btn-primary">Submit enquiry</button>
        </form>
      </section>

      <h2 style="font-size: 1.125rem; margin-top: 2rem">Courses</h2>
      <p style="color: #94a3b8; font-size: 0.875rem">
        List loaded from <code>components/course-cards.html</code> — edit that file to update cards and all dropdowns.
      </p>
      <div data-include-course-cards></div>
    </main>

    <footer data-include-footer></footer>

    <script src="components/include-header.js"></script>
    <script src="components/include-footer.js"></script>
    <script src="components/include-courses.js"></script>
    <script src="js/form-core.js"></script>
    <script src="js/registration-modal.js"></script>
    <script>
      (function () {
        var form = document.getElementById("enquiry-form");
        var core = window.ZSFormCore;
        if (!form || !core) return;
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var rules = [
            { name: "name", validate: function (v) { return core.validateName(v); } },
            { name: "phone", validate: function (v) { return core.validatePhone(v); } },
            { name: "email", validate: function (v) { return core.validateEmail(v); } },
            { name: "course", validate: function (v) { return core.validateSelect(v); } },
            { name: "message", validate: function () { return ""; } },
          ];
          if (!core.validateForm(form, rules)) return;
          core.submitAjax(form, {
            subject: "ZS Soft Tech — Website enquiry",
            thankYouUrl: "thank-you.html",
          });
        });
      })();
    </script>
  </body>
</html>
